<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Wachtwoord, Sluiskade Admin</title>
  {% include "_head_meta.html" %}
  <style>
    :root { --ink: #0f172a; --soft: #1e293b; --amber: #f59e0b; --muted: #94a3b8; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f1f5f9;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%);
    }
    .stage {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%; max-width: 26rem;
      background: var(--soft);
      border: 1px solid #334155;
      border-radius: 1.25rem;
      padding: 2.25rem 2rem;
      box-shadow: 0 24px 64px -20px rgba(0,0,0,0.5);
    }
    .badge {
      display: inline-block;
      background: var(--amber);
      color: var(--ink);
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 999px;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.4rem; color: white; font-weight: 700; letter-spacing: -0.02em; }
    p.lead { color: var(--muted); font-size: 0.92rem; line-height: 1.55; margin: 0 0 1.5rem; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.4rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.6rem;
      color: white;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
    }
    .submit {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.85rem 1.25rem;
      background: var(--amber);
      color: var(--ink);
      font-weight: 700; font-size: 0.95rem; font-family: inherit;
      border: none; border-radius: 0.6rem;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .submit:hover { background: #fbbf24; transform: translateY(-1px); }
    .alert {
      padding: 0.75rem 1rem;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(252, 165, 165, 0.25);
      color: #fecaca;
      border-radius: 0.6rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .step-indicator { display: flex; gap: 6px; justify-content: center; margin-bottom: 1.5rem; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; }
    .step-dot.active { background: var(--amber); }
  </style>
</head>
<body>
  {% from "_icons.html" import icon %}
  <main class="stage">
    <div class="card">
      <div class="step-indicator">
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot active"></div>
      </div>
      <span class="badge">Admin login &middot; stap 3 van 3</span>
      <h1>Admin wachtwoord</h1>
      <p class="lead">Bijna binnen. Vul nog je admin-wachtwoord in.</p>

      {% if error %}
      <div class="alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('admin_password') }}">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" name="password" required
               autocomplete="current-password" autofocus />
        <button class="submit" type="submit">
          {{ icon("shield", size=18, stroke=2) }} Inloggen
        </button>
      </form>
    </div>
  </main>
</body>
</html>
